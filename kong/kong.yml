_format_version: "3.0"
_transform: true

services:
  - name: app_api_service
    url: http://app_server:8080
    routes:
      - name: app_api_public_route
        paths:
          - ~/api/v1/login
          - ~/api/v1/register
          - ~/api/v1/health
          - ~/api/v1/refresh-token
        strip_path: false

        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local


      - name: app_api_protected_route
        paths:
          - /api
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
          - name: post-function
            config:
              access:
                - |
                  local jwt = require("resty.jwt")
                  local auth_header = ngx.var.http_authorization
                  if auth_header then
                    local token = string.sub(auth_header, 8)
                    local jwt_obj = jwt:load_jwt(token)
                    if jwt_obj.valid and jwt_obj.payload and jwt_obj.payload.user_id then
                      ngx.req.set_header("X-User-ID", jwt_obj.payload.user_id)
                    end
                  end

          - name: rate-limiting
            config:
              minute: 100
              policy: local
          - name: file-log
            config:
              path: /dev/stdout

consumers:
  - username: app-consumer
    jwt_secrets:
      - key: app-issuer
        algorithm: RS256
        rsa_public_key: |
