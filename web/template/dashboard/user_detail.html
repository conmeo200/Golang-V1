{{define "content"}}
<div class="user-detail-container">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>{{.Title}}</h2>
        <a href="/dashboard/users" class="btn" style="background: #eee; padding: 8px 16px; border-radius: 4px; text-decoration: none; color: #333;">&larr; Back to Users</a>
    </div>

    <div class="card" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div class="user-info" style="display: flex; gap: 30px;">
            <div class="avatar" style="width: 100px; height: 100px; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; border-radius: 50%;">
                {{.User.Initial}}
            </div>
            <div class="details">
                <h3 style="margin: 0 0 10px 0; font-size: 1.8rem; color: #333;">{{.User.Name}}</h3>
                <p style="margin: 0 0 8px 0; color: #666;"><strong>Email:</strong> {{.User.Email}}</p>
                <p style="margin: 0 0 8px 0; color: #666;"><strong>Role:</strong> <span style="background: #eef; color: #007bff; padding: 3px 8px; border-radius: 12px; font-size: 0.85rem;">{{.User.Role}}</span></p>
                <p style="margin: 0 0 8px 0; color: #666;"><strong>Status:</strong> <span class="status-{{.User.Status}}">{{.User.Status}}</span></p>
                <p style="margin: 0; color: #666;"><strong>Joined At:</strong> {{.User.JoinedAt}}</p>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
        
        <div class="actions">
            <a href="/dashboard/users/edit/{{.User.ID}}" class="btn" style="background: #28a745; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none;">Edit User</a>
            <button class="btn btn-danger" style="background: #dc3545; color: white; padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer;">Delete User</button>
        </div>
    </div>
</div>
{{end}}
