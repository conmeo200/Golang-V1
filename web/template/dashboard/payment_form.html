{{define "content"}}
<div class="dashboard-header" style="margin-bottom: 2rem;">
    <a href="/dashboard/payments" style="text-decoration: none; color: var(--text-muted); font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
        ← Back to Payments
    </a>
    <h1 style="margin-bottom: 0.25rem;">Initiate New Payment</h1>
    <p style="color: var(--text-muted);">Testing Transactional Outbox & Inbox Patterns via manual entry.</p>
</div>

<div style="display: flex; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 700px; padding: 2.5rem;">
        <form action="/dashboard/payments/create" method="POST" id="paymentForm">
            <div class="form-group">
                <label class="form-label">Associated Order</label>
                <select class="form-control" name="order_id" id="order_id" required style="appearance: auto;">
                    <option value="" disabled selected>-- Select an order to pay for --</option>
                    {{range .Orders}}
                        <option value="{{.UUID}}">
                            Order #{{slice .UUID.String 0 8}} - {{.User.Email}} (${{printf "%.2f" .Amount}})
                        </option>
                    {{else}}
                        <option value="" disabled>⚠️ No orders available for payment</option>
                    {{end}}
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">Payment Amount</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">$</span>
                        <input type="number" step="0.01" class="form-control" name="amount" id="amount" placeholder="0.00" required min="0.01" style="padding-left: 2rem;">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Currency</label>
                    <select class="form-control" name="currency" id="currency" required style="appearance: auto;">
                        <option value="usd" selected>USD</option>
                        <option value="eur">EUR</option>
                        <option value="vnd">VND</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Payment Method</label>
                <select class="form-control" name="payment_method" id="payment_method" required style="appearance: auto;">
                    <option value="stripe">Stripe (Card)</option>
                    <option value="paypal">PayPal</option>
                    <option value="vnpay">VNPay</option>
                    <option value="banking">Bank Transfer</option>
                </select>
            </div>

            <div style="background: #eff6ff; border-radius: 8px; padding: 1.25rem; margin-bottom: 2rem; border: 1px dashed #bfdbfe;">
                <div style="display: flex; gap: 0.75rem; align-items: flex-start;">
                    <span style="font-size: 1.25rem;">🛡️</span>
                    <div>
                        <h4 style="font-size: 0.875rem; margin-bottom: 0.25rem; color: #1e40af; font-weight: 700;">Atomic Transaction</h4>
                        <p style="margin-bottom: 0; font-size: 0.75rem; color: #1e40af; opacity: 0.8;">
                            This will create a payment record, log an inbox_event for idempotency, and stage an outbox message in a single DB transaction.
                        </p>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
                Confirm and Process Transaction
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('paymentForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner"></span> Processing Securely...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
        });
    });
</script>

<style>
    .spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
{{end}}
