{{define "content"}}
<style>
    :root {
        --order-primary: #10b981;
        --order-secondary: #059669;
        --order-gradient: linear-gradient(135deg, var(--order-primary) 0%, var(--order-secondary) 100%);
        --input-focus: rgba(16, 185, 129, 0.2);
        --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    .premium-form-container {
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .order-card-premium {
        border: none;
        border-radius: 20px;
        box-shadow: var(--card-shadow);
        background: #ffffff;
        overflow: hidden;
        border: 1px solid #f1f5f9;
    }

    .order-header-premium {
        background: var(--order-gradient);
        color: white;
        padding: 3rem 2rem;
        position: relative;
    }

    .order-header-premium::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(to top, #ffffff, transparent);
        opacity: 0.1;
    }

    .order-header-premium h2 {
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
    }

    .order-header-premium p {
        font-weight: 500;
        opacity: 0.9;
    }

    .form-section-premium {
        padding: 3rem;
    }

    .form-label-premium {
        font-weight: 700;
        color: #334155;
        margin-bottom: 0.75rem;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.025em;
    }

    .input-premium {
        padding: 0.875rem 1.25rem;
        border-radius: 12px;
        border: 1.5px solid #e2e8f0;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        background-color: #f8fafc;
        font-weight: 500;
    }

    .input-premium:focus {
        border-color: var(--order-primary);
        background-color: #ffffff;
        box-shadow: 0 0 0 4px var(--input-focus);
        outline: none;
    }

    .input-group-text-premium {
        background-color: #f1f5f9;
        border: 1.5px solid #e2e8f0;
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: #64748b;
        padding: 0 1.25rem;
    }

    .input-premium.with-prefix {
        border-radius: 0 12px 12px 0;
    }

    .btn-place-order {
        background: var(--order-gradient);
        border: none;
        padding: 1.1rem;
        border-radius: 14px;
        font-weight: 800;
        color: white;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
    }

    .btn-place-order:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
        filter: brightness(1.05);
        color: white;
    }

    .btn-place-order:active {
        transform: translateY(-1px);
    }

    .btn-randomize-premium {
        background: #ffffff;
        color: var(--order-primary);
        border: 2px solid #e2e8f0;
        padding: 0.6rem 1.25rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.875rem;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-randomize-premium:hover {
        border-color: var(--order-primary);
        background: #f0fdf4;
        transform: scale(1.02);
    }

    .random-sparkle {
        animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
    }

    .helper-box {
        background: #f0fdf4;
        border-radius: 12px;
        padding: 1.25rem;
        border: 1px dashed #bbf7d0;
        margin-top: 2rem;
    }
</style>

<div class="container-fluid px-4 py-5 premium-form-container">
    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="h2 fw-extrabold text-slate-900 mb-1">New Transaction</h1>
                    <p class="text-slate-500 mb-0"><i class="fas fa-info-circle me-1"></i> Quick entry for manual order management</p>
                </div>
                <button type="button" class="btn-randomize-premium" id="btnRandomize">
                    <i class="fas fa-wand-magic-sparkles random-sparkle"></i> Quick Fill
                </button>
            </div>

            <div class="card order-card-premium">
                <div class="card-header order-header-premium text-center">
                    <div class="mb-3">
                        <span class="bg-white bg-opacity-20 p-3 rounded-circle d-inline-block">
                            <i class="fas fa-shopping-bag fa-2x"></i>
                        </span>
                    </div>
                    <h2 class="h3">Capture Order</h2>
                    <p class="mb-0">Securely register a new checkout event</p>
                </div>
                <div class="card-body form-section-premium">
                    <form action="/dashboard/orders/create" method="POST" id="orderForm">
                        <div class="row g-4">
                            <!-- Customer Selection -->
                            <div class="col-12">
                                <label for="user_id" class="form-label-premium">Target Customer</label>
                                <select class="form-select input-premium" name="user_id" id="user_id" required>
                                    <option value="" disabled selected>-- Choose customer record --</option>
                                    {{range .Users}}
                                        <option value="{{.ID}}">{{.Email}} (ID: {{.ID}})</option>
                                    {{else}}
                                        <option value="" disabled>⚠️ No customer data available</option>
                                    {{end}}
                                </select>
                            </div>

                            <!-- Amount -->
                            <div class="col-12">
                                <label for="amount" class="form-label-premium">Order Valuation</label>
                                <div class="input-group">
                                    <span class="input-group-text input-group-text-premium"><i class="fas fa-dollar-sign"></i></span>
                                    <input type="number" step="0.01" class="form-control input-premium with-prefix" 
                                           name="amount" id="amount" placeholder="0.00" required min="1">
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="helper-box">
                                    <p class="mb-0 small text-success fw-600 text-center">
                                        <i class="fas fa-bolt me-1"></i> Creating this order will automatically stage an event for asynchronous processing.
                                    </p>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="col-12 mt-5">
                                <button type="submit" class="btn-place-order w-100 mb-4">
                                    Initialize Order Sequence <i class="fas fa-arrow-right ms-2"></i>
                                </button>
                                <div class="text-center">
                                    <a href="/dashboard/orders" class="text-slate-400 text-decoration-none small hover-slate-800 transition-all">
                                        <i class="fas fa-chevron-left me-1"></i> Return to Registry
                                    </a>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const btnRandomize = document.getElementById('btnRandomize');
        const userSelect = document.getElementById('user_id');
        const amountInput = document.getElementById('amount');

        btnRandomize.addEventListener('click', function() {
            // Precise active transition
            this.style.transform = 'scale(0.95)';
            setTimeout(() => this.style.transform = 'scale(1.02)', 100);

            // Random Amount logic (more realistic distributions)
            const randomAmount = (Math.exp(Math.random() * 4) + 10).toFixed(2);
            amountInput.value = randomAmount;

            // Random User logic
            const options = Array.from(userSelect.options).filter(o => o.value !== "");
            if (options.length > 0) {
                userSelect.value = options[Math.floor(Math.random() * options.length)].value;
            }

            // Visual confirmation
            this.innerHTML = '<i class="fas fa-check-circle me-2"></i> Synced!';
            this.style.borderColor = '#10b981';
            this.style.color = '#10b981';
            
            setTimeout(() => {
                this.innerHTML = '<i class="fas fa-wand-magic-sparkles random-sparkle"></i> Quick Fill';
                this.style.borderColor = '#e2e8f0';
                this.style.color = '#10b981';
            }, 800);
        });

        // Sophisticated loading state
        document.getElementById('orderForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Finalizing Transaction...';
            btn.style.opacity = '0.8';
            btn.disabled = true;
        });
    });
</script>
{{end}}
