{{define "content"}}
<div class="dashboard-header" style="margin-bottom: 2rem;">
    <a href="/dashboard/orders" style="text-decoration: none; color: var(--text-muted); font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
        ← Back to Registry
    </a>
    <h1 style="margin-bottom: 0.25rem;">Create New Order</h1>
    <p style="color: var(--text-muted);">Register a new checkout event for asynchronous processing.</p>
</div>

<div style="display: flex; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 600px; padding: 2.5rem;">
        <form action="/dashboard/orders/create" method="POST" id="orderForm">
            <div class="form-group">
                <label class="form-label">Target Customer</label>
                <select class="form-control" name="user_id" id="user_id" required style="appearance: auto;">
                    <option value="" disabled selected>-- Choose customer record --</option>
                    {{range .Users}}
                        <option value="{{.ID}}">{{.Email}} (ID: {{.ID}})</option>
                    {{else}}
                        <option value="" disabled>⚠️ No customer data available</option>
                    {{end}}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Order Valuation (USD)</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">$</span>
                    <input type="number" step="0.01" class="form-control" name="amount" id="amount" placeholder="0.00" required min="1" style="padding-left: 2rem;">
                </div>
            </div>

            <div style="background: #f0fdf4; border-radius: 8px; padding: 1rem; margin-bottom: 2rem; border: 1px dashed #bbf7d0;">
                <p style="margin-bottom: 0; font-size: 0.813rem; color: #166534; text-align: center;">
                    ⚡ Creating this order will trigger an asynchronous payment flow.
                </p>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
                Initialize Order Sequence
            </button>
            
            <button type="button" class="btn btn-outline" id="btnRandomize" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">
                ✨ Quick Fill (Randomize)
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const btnRandomize = document.getElementById('btnRandomize');
        const userSelect = document.getElementById('user_id');
        const amountInput = document.getElementById('amount');

        btnRandomize.addEventListener('click', function() {
            // Random Amount logic
            const randomAmount = (Math.floor(Math.random() * 500) + 10).toFixed(2);
            amountInput.value = randomAmount;

            // Random User logic
            const options = Array.from(userSelect.options).filter(o => o.value !== "");
            if (options.length > 0) {
                userSelect.value = options[Math.floor(Math.random() * options.length)].value;
            }
        });

        // Loading state
        document.getElementById('orderForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner"></span> Processing...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
        });
    });
</script>

<style>
    .spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
{{end}}
