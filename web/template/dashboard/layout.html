<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        /* Modern DataTables styling to match dashboard */
        .dataTables_wrapper {
            padding: 20px;
        }
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 6px 10px;
            margin-left: 8px;
            outline: none;
        }
        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        table.dataTable thead th {
            border-bottom: 2px solid #e2e8f0;
            color: #475569;
        }
        table.dataTable.no-footer {
            border-bottom: 1px solid #e2e8f0;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current, 
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            color: #0f172a !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div style="background: var(--primary); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;">H</div>
                HeeloAdmin
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/dashboard" class="nav-link {{if eq .ActiveMenu "dashboard"}}active{{end}}">
                        Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard/users" class="nav-link {{if eq .ActiveMenu "users"}}active{{end}}">
                        Users Management
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard/grades" class="nav-link {{if eq .ActiveMenu "grades"}}active{{end}}">
                        My Grades
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard/profile" class="nav-link {{if eq .ActiveMenu "profile"}}active{{end}}">
                        Student Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard/analytics" class="nav-link {{if eq .ActiveMenu "analytics"}}active{{end}}">
                        Analytics
                    </a>
                </li>
                <li class="nav-item" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
                    <a href="/dashboard/sports" class="nav-link {{if eq .ActiveMenu "sports"}}active{{end}}">
                        ⚽ Sports Hub
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/news" class="nav-link">

                        Back to Site
                    </a>
                </li>
            </ul>

            <div style="margin-top: auto;">
                <a href="/login" class="nav-link" style="color: #ef4444;">Logout</a>
            </div>
        </aside>

        <!-- Content -->
        <main class="main-content">
            {{template "content" .}}
        </main>
    </div>

    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- DataTables JS -->
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    {{block "scripts" .}}{{end}}
</body>
</html>
