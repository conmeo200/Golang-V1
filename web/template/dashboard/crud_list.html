{{define "content"}}
<header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="margin-bottom: 0.25rem;">Users Management</h1>
        <p style="color: var(--text-muted);">Manage your application members and their roles.</p>
    </div>
    <a href="/dashboard/users/new" class="btn btn-primary">+ Add New User</a>
</header>

<div class="card" style="padding: 0;">
    <div class="table-container">
        <table id="usersTable" style="width: 100%;">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Joined Date</th>
                    <th>Status</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{range .Users}}
                <tr>
                    <td>
                        <div style="font-weight: 600;">{{.Name}}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">{{.Email}}</div>
                    </td>
                    <td>{{.Role}}</td>
                    <td>{{.JoinedAt}}</td>
                    <td><span class="badge {{if eq .Status "Active"}}badge-success{{else}}badge-warning{{end}}">{{.Status}}</span></td>
                    <td style="text-align: right;">
                        <a href="/dashboard/users/edit/{{.ID}}" style="color: var(--primary); margin-right: 1rem; text-decoration: none; font-size: 0.875rem;">Edit</a>
                        <a href="#" style="color: #ef4444; text-decoration: none; font-size: 0.875rem;">Delete</a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
    $(document).ready(function() {
        $('#usersTable').DataTable({
            "pageLength": 10,
            "language": {
                "search": "Search users:"
            }
        });
    });
</script>
{{end}}
