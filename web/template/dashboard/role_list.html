{{define "content"}}
<div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="margin-bottom: 0.25rem;">Role Management</h1>
        <p style="color: var(--text-muted);">Configure access control and permission sets.</p>
    </div>
    <a href="/dashboard/roles/new" class="btn btn-primary">+ Add New Role</a>
</div>

<div class="table-container-premium">
    <div style="padding: 1.5rem;">
        <table id="rolesTable" class="premium-table">
            <thead>
                <tr>
                    <th>Role ID</th>
                    <th>Role Name</th>
                    <th>Description</th>
                    <th style="text-align: center;">Users Count</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{range .Roles}}
                <tr>
                    <td><span class="uuid-code">#{{.ID}}</span></td>
                    <td style="font-weight: 600;">{{.Name}}</td>
                    <td style="color: var(--text-muted); font-size: 0.875rem;">{{.Description}}</td>
                    <td style="text-align: center;">
                        <span class="badge badge-info">{{.UsersCount}} Users</span>
                    </td>
                    <td style="text-align: right;">
                        <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                            <a href="/dashboard/roles/detail/{{.ID}}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Permissions</a>
                            <a href="/dashboard/roles/edit/{{.ID}}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Edit</a>
                            <form action="/dashboard/roles/delete/{{.ID}}" method="POST" style="margin: 0; display: inline;" onsubmit="return confirm('Are you sure you want to delete this role?');">
                                <button type="submit" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border: 1px solid #ef4444; color: #ef4444; background: transparent; cursor: pointer; border-radius: 4px;">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        if ($.fn.DataTable) {
            $('#rolesTable').DataTable({
                "pageLength": 10,
                "language": {
                    "search": "",
                    "searchPlaceholder": "Filter roles...",
                    "lengthMenu": "Show _MENU_"
                }
            });
        }
    });
</script>
{{end}}
