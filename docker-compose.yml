version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "${HOST_APP}:${PORT_APP}"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_API_KEYS=${ALLOWED_API_KEYS}
  db:
    image: postgres:16
    container_name: primiary_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
  replica:
    image: postgres:16
    container_name: replica_db
    environment:
      - POSTGRES_USER=${DB_USER_REP}
      - POSTGRES_PASSWORD=${DB_PASSWORD_REP}
      - POSTGRES_DB=${DB_NAME_REP}
    ports:
      - "5433:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data

volumes:
  pgdata:
  replica_data: