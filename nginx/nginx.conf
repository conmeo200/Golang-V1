worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # HTTP entry point
    server {
        listen 80;
        server_name localhost;

        # Stripe webhook endpoint:
        # Keep this path on HTTP locally because ngrok already provides HTTPS publicly.
        # This avoids unnecessary 301 redirects that can break webhook delivery.
        location /api/v1/webhooks/stripe {
            proxy_pass http://app_server:8080;
            proxy_http_version 1.1;

            # Preserve original request metadata
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward Stripe signature header for webhook verification
            proxy_set_header Stripe-Signature $http_stripe_signature;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS entry point
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # Serve static files directly
        location /static/ {
            alias /app/web/static/;
            expires 30d;
        }

        # Main app routes
        location / {
            proxy_pass http://app_server:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API v1 routes
        location /api/v1/ {
            proxy_pass http://app_server:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
